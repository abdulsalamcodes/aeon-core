openapi: "3.0.3"
info:
  title: Aeon School Management API
  version: 1.0.0
  description: |
    Backend API for the Aeon school management platform.

    **Auth flow:** Most endpoints require a JWT access token (`Authorization: Bearer <token>`) obtained
    from `POST /v1/auth/login` or `POST /v1/admin/auth/login`. The tenant (school + org) is resolved
    from the token automatically — no tenant-ID header needed.

    **Student portal:** Students authenticate via `POST /v1/portal/auth/student-login` using their
    admission number + date of birth.

    **Error shape (422):**
    ```json
    { "error": "Validation failed", "details": { "fieldErrors": { "name": ["Required"] }, "formErrors": [] } }
    ```

    **Error shape (4xx/5xx):**
    ```json
    { "error": "message" }
    ```

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.aeon.app/v1
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from `/v1/auth/login` or `/v1/admin/auth/login`.

  schemas:
    # ─── Generic wrappers ──────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        data: {}
      description: Most successful responses wrap payload under a `data` key.
    ListResponse:
      type: object
      properties:
        data:
          type: array
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: Validation failed
        details:
          type: object
          properties:
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            formErrors:
              type: array
              items:
                type: string

    # ─── Auth / Identity ───────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        schoolId:
          type: string
          format: uuid
          description: Pick a specific school (multi-school accounts).
        schoolSlug:
          type: string
    LoginResult:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accountId:
          type: string
          format: uuid
        displayName:
          type: string
        active:
          $ref: "#/components/schemas/MembershipSummary"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipSummary"
    MembershipSummary:
      type: object
      properties:
        schoolId:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        schoolName:
          type: string
        schoolSlug:
          type: string
        role:
          type: string
        orgWide:
          type: boolean
    SignupInput:
      type: object
      required: [schoolName, adminName, email, password, plan]
      properties:
        schoolName:
          type: string
          minLength: 2
        adminName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        plan:
          type: string
          enum: [starter, growth]
    SignupResult:
      type: object
      properties:
        schoolSlug:
          type: string
        plan:
          type: string
        paymentRequired:
          type: boolean
    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
        schoolSlug:
          type: string
    VerifyEmailInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
    ForgotPasswordInput:
      type: object
      properties:
        email:
          type: string
          format: email
    ResetPasswordInput:
      type: object
      properties:
        password:
          type: string
    ChangePasswordInput:
      type: object
      properties:
        currentPassword:
          type: string
        password:
          type: string
    MeResult:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
        displayName:
          type: string
        active:
          $ref: "#/components/schemas/MembershipSummary"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipSummary"

    # ─── Org / School ──────────────────────────────────────────────────
    SchoolPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
    SchoolSettings:
      type: object
      properties:
        billing:
          type: object
          properties:
            plan:
              type: string
            status:
              type: string
    CheckoutPlanInput:
      type: object
      required: [plan]
      properties:
        plan:
          type: string

    # ─── Subjects ──────────────────────────────────────────────────────
    CreateSubjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
    Subject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    # ─── Classes ───────────────────────────────────────────────────────
    CreateClassInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        classTeacherId:
          type: string
          format: uuid
    Class:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        classTeacherId:
          type: string
          format: uuid
          nullable: true
        classTeacherName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ─── People ────────────────────────────────────────────────────────
    CreateStudentInput:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        studentNumber:
          type: string
        gender:
          type: string
          enum: [male, female]
        dob:
          type: string
        guardianName:
          type: string
        guardianPhone:
          type: string
        guardianEmail:
          type: string
        classId:
          type: string
          format: uuid
          description: Enrol immediately (fires StudentEnrolled ripple).
        termId:
          type: string
          format: uuid
    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        studentNumber:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        guardianName:
          type: string
          nullable: true
        guardianPhone:
          type: string
          nullable: true
        guardianEmail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    CsvImportInput:
      type: object
      required: [csv]
      properties:
        csv:
          type: string
          minLength: 1
    CsvImportResult:
      type: object
      properties:
        succeeded:
          type: integer
        failed:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              error:
                type: string
    CreateStaffInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          default: teacher
    Staff:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        role:
          type: string
    EnrollInput:
      type: object
      required: [studentId, classId, termId]
      properties:
        studentId:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
    Enrollment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    LinkGuardianInput:
      type: object
      required: [guardianId, studentId]
      properties:
        guardianId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        relationship:
          type: string
          maxLength: 60
    PromoteInput:
      type: object
      required: [fromClassId, toClassId]
      properties:
        fromClassId:
          type: string
          format: uuid
        toClassId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        studentIds:
          type: array
          items:
            type: string
            format: uuid
        promoteAll:
          type: boolean
    PromoteResult:
      type: object
      properties:
        promoted:
          type: integer

    # ─── Academics ─────────────────────────────────────────────────────
    RegisterQuery:
      type: object
      properties:
        classId:
          type: string
          format: uuid
        date:
          type: string
    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        date:
          type: string
        status:
          type: string
          enum: [present, absent, late, excused, unmarked]
    MarkInput:
      type: object
      required: [attendanceId, status]
      properties:
        attendanceId:
          type: string
          format: uuid
        status:
          type: string
          enum: [present, absent, late, excused, unmarked]
    BulkMarkInput:
      type: object
      required: [classId, termId, date, records]
      properties:
        classId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        date:
          type: string
        records:
          type: array
          items:
            type: object
            properties:
              studentId:
                type: string
                format: uuid
              status:
                type: string
                enum: [present, absent, late, excused, unmarked]
    RecordGradeInput:
      type: object
      required: [studentId, subjectId, termId, caScore, examScore]
      properties:
        studentId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        caScore:
          type: integer
          minimum: 0
          maximum: 100
        examScore:
          type: integer
          minimum: 0
          maximum: 100
    Grade:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        caScore:
          type: integer
        examScore:
          type: integer
    GradeClassQuery:
      type: object
      properties:
        classId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
    GradeStudentQuery:
      type: object
      properties:
        studentId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid

    # ─── Terms ─────────────────────────────────────────────────────────
    CreateTermInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        startDate:
          type: string
        endDate:
          type: string
        isCurrent:
          type: boolean
    Term:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
        isCurrent:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ─── Finance ───────────────────────────────────────────────────────
    CreateFeeStructureInput:
      type: object
      required: [termId, name, amountMinor, currency]
      properties:
        termId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        amountMinor:
          type: integer
          exclusiveMinimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        isDefault:
          type: boolean
    FeeStructure:
      type: object
      properties:
        id:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        name:
          type: string
        amountMinor:
          type: integer
        currency:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
    AssignFeeInput:
      type: object
      required: [studentId, feeStructureId]
      properties:
        studentId:
          type: string
          format: uuid
        feeStructureId:
          type: string
          format: uuid
    AssignClassInput:
      type: object
      required: [classId, feeStructureId, termId]
      properties:
        classId:
          type: string
          format: uuid
        feeStructureId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
    RecordPaymentInput:
      type: object
      required: [studentId, termId, amountMinor, currency, idempotencyKey]
      properties:
        studentId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        amountMinor:
          type: integer
          exclusiveMinimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        idempotencyKey:
          type: string
          minLength: 8
        method:
          type: string
          enum: [cash, transfer, card, mobile-money]
          default: cash
        reference:
          type: string
    InitiatePaymentInput:
      type: object
      required: [studentId, termId, amountMinor, currency, email]
      properties:
        studentId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        amountMinor:
          type: integer
          exclusiveMinimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        email:
          type: string
          format: email
    InitiatePaymentResult:
      type: object
      properties:
        providerRef:
          type: string
        redirectUrl:
          type: string
    WebhookTermId:
      type: object
      required: [termId]
      properties:
        termId:
          type: string
          format: uuid
    StudentTermQuery:
      type: object
      properties:
        studentId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
    TermIdQuery:
      type: object
      properties:
        termId:
          type: string
          format: uuid
    LedgerEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        direction:
          type: string
          enum: [debit, credit]
        kind:
          type: string
        amountMinor:
          type: integer
        currency:
          type: string
        reference:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    OutstandingBalance:
      type: object
      properties:
        studentId:
          type: string
          format: uuid
        name:
          type: string
        amountDue:
          type: number
        amountPaid:
          type: number
        balance:
          type: number
        status:
          type: string
          enum: [paid, partial, unpaid]

    # ─── Schedule ──────────────────────────────────────────────────────
    CreateEventInput:
      type: object
      required: [title, startDate, endDate, type]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        type:
          type: string
          enum: [holiday, exam, event, term-start, term-end]
    CalendarEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
        endDate:
          type: string
        type:
          type: string
        schoolId:
          type: string
          format: uuid
    TimetableQuery:
      type: object
      properties:
        classId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
    UpsertTimetableInput:
      type: object
      required: [classId, termId, schedule]
      properties:
        classId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        schedule:
          type: array
          items:
            type: object
            properties:
              day:
                type: string
              periods:
                type: array
    Timetable:
      type: object
      properties:
        id:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        schedule:
          type: array

    # ─── Uploads ───────────────────────────────────────────────────────
    PresignInput:
      type: object
      required: [contentType]
      properties:
        contentType:
          type: string
    PhotoUploadInput:
      type: object
      required: [dataUrl]
      properties:
        dataUrl:
          type: string
          pattern: "^data:"
    PresignResult:
      type: object
      properties:
        strategy:
          type: string
          enum: [inline, direct]
        url:
          type: string
        fields:
          type: object
    PhotoUploadResult:
      type: object
      properties:
        url:
          type: string

    # ─── Notifications ─────────────────────────────────────────────────
    SendNotificationInput:
      type: object
      required: [channel, to, template, body]
      properties:
        channel:
          type: string
          enum: [sms, whatsapp, email]
        to:
          type: string
          minLength: 3
        template:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        channel:
          type: string
        toAddress:
          type: string
        template:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [queued, sent, failed]
        createdAt:
          type: string
          format: date-time

    # ─── Workflow ──────────────────────────────────────────────────────
    DefineWorkflowInput:
      type: object
      required: [key, steps]
      properties:
        key:
          type: string
          minLength: 1
        steps:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              name:
                type: string
                minLength: 1
              approverRole:
                type: string
                minLength: 1
    StartWorkflowInput:
      type: object
      required: [key, subjectRef]
      properties:
        key:
          type: string
          minLength: 1
        subjectRef:
          type: string
          minLength: 1
    DecideWorkflowInput:
      type: object
      required: [taskId, decision]
      properties:
        taskId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [approve, reject]
        deciderId:
          type: string
          format: uuid
    WorkflowDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        steps:
          type: array
    WorkflowTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        instanceId:
          type: string
          format: uuid
        stepIndex:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
        approverRole:
          type: string
        createdAt:
          type: string
          format: date-time

    # ─── Portal ────────────────────────────────────────────────────────
    StudentLoginInput:
      type: object
      required: [studentNumber, dob, schoolSlug]
      properties:
        studentNumber:
          type: string
          minLength: 1
        dob:
          type: string
          minLength: 1
        schoolSlug:
          type: string
          minLength: 1
    PortalStudent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstname:
          type: string
        lastname:
          type: string
        studentNumber:
          type: string
        classId:
          type: string
        className:
          type: string
        schoolId:
          type: string
    PortalStudentLoginResult:
      type: object
      properties:
        accessToken:
          type: string
        student:
          $ref: "#/components/schemas/PortalStudent"

    # ─── Admin ─────────────────────────────────────────────────────────
    AdminLoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AdminLoginResult:
      type: object
      properties:
        accessToken:
          type: string
        email:
          type: string
    CreateInstitutionInput:
      type: object
      required: [schoolName, name, email, password]
      properties:
        schoolName:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    CreateAdminInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    UpdateAdminInput:
      type: object
      properties:
        status:
          type: string
          enum: [active, disabled]
    Institution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        orgId:
          type: string
        orgName:
          type: string
        totalStudents:
          type: integer
        totalStaff:
          type: integer
        createdAt:
          type: string
          format: date-time
    AdminDashboard:
      type: object
      properties:
        totalInstitutions:
          type: integer
        totalStudents:
          type: integer
        totalStaff:
          type: integer
        totalSuperAdmins:
          type: integer
        newThisMonth:
          type: integer
        activity:
          type: array
        topInstitutions:
          type: array
    SuperAdmin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    # ─── Insights ──────────────────────────────────────────────────────
    StatsResult:
      type: object
      properties:
        totalStudents:
          type: integer
        totalStaff:
          type: integer
        totalClasses:
          type: integer
        presentToday:
          type: integer
    ActivityEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
        actorName:
          type: string
        createdAt:
          type: string
          format: date-time

paths:
  # ═══════════════════════════════════════════════════════════════════════
  # HEALTH
  # ═══════════════════════════════════════════════════════════════════════
  /health:
    get:
      summary: Liveness check
      operationId: health
      tags: [Health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ═══════════════════════════════════════════════════════════════════════
  # AUTH (public)
  # ═══════════════════════════════════════════════════════════════════════
  /v1/auth/login:
    post:
      summary: Login with email + password
      operationId: authLogin
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
